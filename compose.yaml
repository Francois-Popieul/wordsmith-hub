services:
  db:
    image: postgres:18-alpine
    container_name: wordsmithhubdb
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_APP_DB}
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_APP_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend  
  
  identitydb:
    image: postgres:18-alpine
    container_name: identitydb
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_IDENTITY_DB}
    ports:
      - 5433:5432
    volumes:
      - identity_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_IDENTITY_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  adminer:
    image: adminer
    restart: always
    ports:
      - ${ADMINER_PORT}
    depends_on:
      db:
        condition: service_healthy
      identitydb:
        condition: service_healthy
    networks:
      - backend  
  
  volumes:
    db_data:
    identity_data:
      
  networks:
    backend:
      driver: bridge