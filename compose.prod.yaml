services:
  api:
    image: ${BACKEND_REPO}
    restart: always
    depends_on:
      - maindb
      - identitydb
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MainDbConnection: "Server=maindb;Database=${POSTGRES_APP_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__IdentityDbConnection: "Server=identitydb;Database=${POSTGRES_IDENTITY_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Jwt__AccessTokenSeconds: "${JWT_ACCESSTOKENSECONDS}"
    networks:
      - wordsmith_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - api
      - frontend
    networks:
      - wordsmith_network

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot;
               sleep 720h;
             done"
    networks:
      - wordsmith_network

  maindb:
    image: postgres:18-alpine
    container_name: wordsmithhubdb
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_APP_DB}"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_APP_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  identitydb:
    image: postgres:18-alpine
    container_name: identitydb
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_IDENTITY_DB}"
    volumes:
      - identity_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_IDENTITY_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wordsmith_network

  frontend:
    restart: always
    image: ${FRONTEND_REPO}
    build:
      context: ./src/gui
      args:
        VITE_API_BASE_URL: ${FRONTEND_VITE_API_BASE_URL}
    networks:
      - wordsmith_network

volumes:
  db_data:
  identity_data:

networks:
  wordsmith_network:
    driver: bridge
