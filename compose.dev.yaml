services:
  api:
    build: .
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - maindb
      - identitydb
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MainDbConnection: "Server=maindb;Database=${POSTGRES_APP_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__IdentityDbConnection: "Server=identitydb;Database=${POSTGRES_IDENTITY_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Jwt__AccessTokenSeconds: "${JWT_ACCESSTOKENSECONDS}"
    networks:
      - backend

  maindb:
    image: postgres:18-alpine
    container_name: wordsmithhubdb-dev
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_APP_DB}"
    ports:
      - ${POSTGRES_APP_DB_PORT}:5432
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_APP_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  identitydb:
    image: postgres:18-alpine
    container_name: identitydb-dev
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_IDENTITY_DB}"
    ports:
      - ${POSTGRES_IDENTITY_DB_PORT}:5432
    volumes:
      - identity_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_IDENTITY_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

volumes:
  db_data:
  identity_data:

networks:
  backend:
    driver: bridge
