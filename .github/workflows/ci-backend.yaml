name: CI-Backend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "WordsmithHub.sln"
      - ".github/workflows/ci-backend.yaml"
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"
      - "WordsmithHub.sln"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution
        run: dotnet restore WordsmithHub.sln

      - name: Build solution (Release)
        run: dotnet build WordsmithHub.sln --no-restore --configuration Release

      - name: Publish backend API
        run: dotnet publish src/backend/WordsmithHub.API/WordsmithHub.API.csproj --configuration Release --output ./publish

      - name: Upload backend publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: publish

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution
        run: dotnet restore WordsmithHub.sln

      - name: Run tests with coverage
        run: |
          dotnet test WordsmithHub.sln \
            --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=lcov \
            /p:CoverletOutput=./coverage/

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: src/backend/tests/**/coverage/coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend-coverage/coverage.info
          fail_ci_if_error: true
