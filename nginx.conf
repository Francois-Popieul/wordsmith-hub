server {
    listen 80;
    server_name wordsmithhub.poplar-services.fr www.wordsmithhub.poplar-services.fr;

    # Serve ACME challenge files for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wordsmithhub.poplar-services.fr www.wordsmithhub.poplar-services.fr;

    # SSL certificates generated by Certbot
    ssl_certificate /etc/letsencrypt/live/wordsmithhub.poplar-services.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wordsmithhub.poplar-services.fr/privkey.pem;

    # Recommended security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy requests to the frontend container
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name wordsmithhub-api.poplar-services.fr www.wordsmithhub-api.poplar-services.fr;

    # Serve ACME challenge files for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wordsmithhub-api.poplar-services.fr www.wordsmithhub-api.poplar-services.fr;

    # SSL certificates generated by Certbot
    ssl_certificate /etc/letsencrypt/live/wordsmithhub-api.poplar-services.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wordsmithhub-api.poplar-services.fr/privkey.pem;

    # Recommended security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy requests to the .NET API container
    location / {
        proxy_pass http://api:8080;  # API service name + port inside Docker
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
