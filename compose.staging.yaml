services:
  api:
    image: ${BACKEND_REPO}
    restart: always
    depends_on:
      - maindb
      - identitydb
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MainDbConnection: "Server=maindb;Database=${POSTGRES_APP_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__IdentityDbConnection: "Server=identitydb;Database=${POSTGRES_IDENTITY_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Jwt__AccessTokenSeconds: "${JWT_ACCESSTOKENSECONDS}"
    networks:
      - wordsmith_staging_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.staging.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - api
      - frontend
    networks:
      - wordsmith_staging_network

  certbot:
    image: certbot/dns-ovh:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/ovh.ini:/etc/letsencrypt/ovh.ini:ro
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --dns-ovh --dns-ovh-credentials /etc/letsencrypt/ovh.ini;
               sleep 720h;
             done"
    networks:
      - wordsmith_staging_network

  maindb:
    image: postgres:18-alpine
    container_name: wordsmithhubdb-staging
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_APP_DB}"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_APP_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wordsmith_staging_network

  identitydb:
    image: postgres:18-alpine
    container_name: identitydb-staging
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_IDENTITY_DB}"
    volumes:
      - identity_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_IDENTITY_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wordsmith_staging_network
  
  frontend:
    restart: always
    image: ${FRONTEND_REPO}
    networks:
      - wordsmith_staging_network

volumes:
  db_data:
  identity_data:

networks:
  wordsmith_staging_network:
    driver: bridge
